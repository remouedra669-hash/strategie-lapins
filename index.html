<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Stratégie Lapins - Gestion Vente</title>
  <link rel="stylesheet" href="./style.css">
</head>
<body>
  <header>
    <h1>🐰 Stratégie Vente Lapins</h1>
    <nav>
      <button onclick="showSection('dashboard')">Tableau de bord</button>
      <button onclick="showSection('produits')">Produits</button>
      <button onclick="showSection('strategies')">Stratégies</button>
      <button onclick="showSection('ventes')">Ventes</button>
    </nav>
  </header>

  <main>
    <!-- Dashboard -->
    <section id="dashboard" class="section">
      <h2>Tableau de bord</h2>
      <div id="stats"></div>
    </section>

    <!-- Produits -->
    <section id="produits" class="section hidden">
      <h2>🐇 Mes Produits</h2>
      <button onclick="ajouterProduit()">+ Nouveau produit</button>
      <table id="tableProduits">
        <thead><tr><th>Nom</th><th>Race</th><th>Âge</th><th>Stock</th><th>Prix</th><th>Actions</th></tr></thead>
        <tbody></tbody>
      </table>
    </section>

    <!-- Stratégies -->
    <section id="strategies" class="section hidden">
      <h2>Stratégies de Vente</h2>
      <button onclick="ajouterStrategie()">+ Nouvelle stratégie</button>
      <div id="listeStrategies"></div>
    </section>

    <!-- Ventes -->
    <section id="ventes" class="section hidden">
      <h2>Enregistrer une vente</h2>
      <!-- Formulaire à compléter -->
    </section>
  </main>

 <script src="./app.js"></script>
</body>
</html>
